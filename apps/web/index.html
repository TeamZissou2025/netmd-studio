<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetMD Studio — The all-in-one MiniDisc platform</title>
    <meta name="description" content="Design J-card labels, transfer audio via WebUSB, browse the MiniDisc device library, and buy/sell hardware on the marketplace. The all-in-one MiniDisc platform." />
    <link rel="canonical" href="https://netmd.studio" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NetMD Studio" />
    <meta property="og:title" content="NetMD Studio — The all-in-one MiniDisc platform" />
    <meta property="og:description" content="Design J-card labels, transfer audio via WebUSB, browse the MiniDisc device library, and buy/sell hardware on the marketplace." />
    <meta property="og:url" content="https://netmd.studio" />
    <meta property="og:image" content="https://netmd.studio/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NetMD Studio — The all-in-one MiniDisc platform" />
    <meta name="twitter:description" content="Design J-card labels, transfer audio via WebUSB, browse the MiniDisc device library, and buy/sell hardware on the marketplace." />
    <meta name="twitter:image" content="https://netmd.studio/og-image.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#FAFAF8" />
    <meta name="color-scheme" content="light dark" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Prevent FOUC: apply saved theme before render -->
    <script>
      (function() {
        var t = localStorage.getItem('netmd-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </head>
  <body class="bg-surface-0 text-text-primary antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
